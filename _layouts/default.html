<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <nav>
    <div class="nav-inner wrap">
      <a class="brand" href="/"><img src="/assets/logo-mark.svg" alt="NM"><span class="brand-text">Notes</span></a>
      <div class="nav-links">
        <a href="https://niharmasurkar.com">Main site ↗</a>
      </div>
    </div>
  </nav>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-foot wrap">
    <span>Built with Jekyll · acoustic-signal theme</span>
    <a href="https://niharmasurkar.com">niharmasurkar.com</a>
  </footer>
</body>
</html>
