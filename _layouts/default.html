<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <header class="site-head">
    <a class="brand" href="/">
      <span class="brand-mark">NM</span>
      <span class="brand-text">Notes</span>
    </a>

      <a href="https://niharmasurkar.com">← Main site</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-foot">
    <span>Built with Jekyll · acoustic-signal theme</span>
    <a href="https://niharmasurkar.com">niharmasurkar.com</a>
  </footer>
