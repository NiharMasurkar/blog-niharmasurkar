<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="alternate icon" href="{{ '/assets/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}">
</head>
<body>
  <nav>
    <div class="nav-inner wrap">
      <a class="brand" href="{{ '/' | relative_url }}">
        <svg class="brand-logo" viewBox="0 20 540 92" role="img" aria-label="Nihar Masurkar — Robotics and Nondestructive Evaluation" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="nmw" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#F2A65A"/>
              <stop offset="1" stop-color="#45C8B8"/>
            </linearGradient>
          </defs>
          <g transform="translate(8,15) scale(0.55)" fill="none" stroke="url(#nmw)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
            <path d="M33 132 L33 68 L81 132 L81 68"/>
            <path d="M111 132 L111 68 L139 108 L167 68 L167 132"/>
          </g>
          <line x1="135" y1="34" x2="135" y2="106" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
          <text x="158" y="68" font-size="42" font-family="'Space Grotesk',sans-serif" font-weight="600" fill="#E7ECF5">Nihar Masurkar</text>
          <text x="160" y="98" font-size="12" font-family="'IBM Plex Mono',monospace" font-weight="500" fill="#45C8B8" letter-spacing="3">ROBOTICS · NONDESTRUCTIVE EVALUATION</text>
        </svg>
      </a>
      <div class="nav-links">
        <a href="https://niharmasurkar.com">Main site ↗</a>
      </div>
    </div>
  </nav>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-foot wrap">
    <span>Built with Jekyll · acoustic-signal theme</span>
    <a href="https://niharmasurkar.com">niharmasurkar.com</a>
  </footer>
</body>
</html>
